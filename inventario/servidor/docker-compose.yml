services:
  apache:
    build: .
    ports:
      - "80:80"
      - "443:443"
    links:
      - mysql
      - phpmyadmin
    volumes:
      - .:/var/www/html
    container_name: laravel-apache

  mysql:
    image: mysql:9.4.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin
    volumes:
      - db_data:/var/lib/mysql
    container_name: laravel-mysql

  phpmyadmin:
    image: phpmyadmin:5.2.2-apache
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
    container_name: laravel-phpmyadmin

volumes:
  db_data:
